<main class="page-container">
  <section class="background">
    <app-game-page></app-game-page>
  </section>

  <article class="container">
    <div class="custom-box" [ngClass]="{ 'closing': isClosing }">
      <!-- 🎨 Header dinámico -->
      <div class="register-header">
        <h1 class="register-title">{{ headerTitle }}</h1>
      </div>

      <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
        <app-input-atom
          title="Tu nombre"
          type="text"
          formControlName="name"
          [autofocus]="true">
        </app-input-atom>

        <div class="validation-space" *ngIf="showErrors">
          <div class="error-message" [ngClass]="{ 'hidden': !showErrors }">
            {{ errorMessage }}
          </div>
        </div>

        <div class="role-selector" *ngIf="noRoleSelector">
          <label class="role-option">
            <input type="radio" formControlName="role" value="player" aria-label="Jugador">
            <span class="custom-radio"></span>
            <span class="role-text">Jugador</span>
          </label>
          <label class="role-option">
            <input type="radio" formControlName="role" value="spectator" aria-label="Espectador">
            <span class="custom-radio"></span>
            <span class="role-text">Espectador</span>
          </label>
        </div>
        <ng-template #noRoleSelector>
          <div class="role-placeholder"></div>
        </ng-template>

        <app-button
          [disabled]="isLoading"
          (click)="onSubmit()"
          (keydown.enter)="onSubmit()">
          <span *ngIf="!isLoading">{{ buttonLabel }}</span>
          <span *ngIf="isLoading" class="loading-text">
            <span class="spinner"></span>
            Cargando...
          </span>
        </app-button>
      </form>
    </div>
  </article>
</main>
