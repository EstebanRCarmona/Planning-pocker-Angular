<article class="table-container">
  <!-- Contenedor global para todas las animaciones de lanzamiento -->
  <div class="global-throw-anim-container">
    <ng-container *ngFor="let anim of activeAnimations">
      <div class="throw-anim" 
           [attr.data-anim-id]="anim.id"
           [ngClass]="[anim.objectType, anim.direction, anim.isImpact ? 'impact' : 'flight', 'seq-' + anim.sequence, 'total-' + anim.totalInSequence]">
        <span *ngIf="anim.objectType === 'heart'">❤️</span>
        <span *ngIf="anim.objectType === 'paper'">💣</span>
        <span *ngIf="anim.objectType === 'star'">⭐</span>
      </div>
    </ng-container>
  </div>

  <header class="cards-row">
    <ng-container *ngFor="let position of ['side-top-left', 'center', 'side-top-right']">
      <ng-container *ngTemplateOutlet="playerDisplayTemplate; context: {
        position: position,
        player: getPlayerByID(position),
        adminOptions: adminTransferOptions[position]
      }"></ng-container>
    </ng-container>
  </header>

  <section class="table-row-wrapper">
    <ng-container *ngFor="let position of ['left-side', 'right-side']">
      <ng-container *ngTemplateOutlet="playerDisplayTemplate; context: {
        position: position,
        player: getPlayerByID(position),
        adminOptions: adminTransferOptions[position],
        containerClass: position === 'left-side' ? 'circle-container-left' : 'circle-container-right',
        cardClass: position === 'left-side' ? 'side-card left' : 'side-card right'
      }"></ng-container>
    </ng-container>

    <div class="table-row">
      <div class="rectangle"></div>
      <div class="rectangle-2"></div>
      <div class="rectangle-3"></div>
    </div>
  </section>

  <footer class="cards-row">
    <ng-container *ngFor="let position of ['bottom-left-1', 'bottom-center', 'bottom-right-1']">
      <ng-container *ngTemplateOutlet="playerDisplayTemplate; context: {
        position: position,
        player: getPlayerByID(position),
        adminOptions: adminTransferOptions[position]
      }"></ng-container>
    </ng-container>
  </footer>

  <ng-template #playerDisplayTemplate let-position="position" let-player="player" let-adminOptions="adminOptions"
               let-containerClass="containerClass" let-cardClass="cardClass">
    <ng-container *ngIf="player?.rol === 'player'">
      <div class="player-wrapper" 
           [attr.data-player-position]="position"
           (mouseenter)="showAdminTransferTooltip(position); showThrowTooltipFor(position)" 
           (mouseleave)="hideAdminTransferTooltip(position); hideThrowTooltip(position)">
        <app-card
          [ngClass]="cardClass || ''"
          [title]="getPlayerForPosition(position) || ''"
          [isAdmin]="player?.isAdmin"
          [adminTransferOptions]="adminOptions"
          [overlay]="getPlayerCardOverlay(position).overlay"
          [voted]="getPlayerCardOverlay(position).vote"
          [userRole]="isAdmin()"
          (keydown)="$event.preventDefault()"
          (click)="isAdmin() && passAdmin(position)"
        >
          <div *ngIf="adminOptions" 
               class="admin-transfer-tooltip" 
               (mouseenter)="showAdminTransferTooltipAgain(position)"
               (mouseleave)="hideAdminTransferTooltip(position)">
            🔑 Pasar permisos de admin
          </div>
        </app-card>
        <!-- Tooltip de lanzar objeto - FUERA de app-card -->
        <div *ngIf="showThrowTooltip[position]" class="throw-tooltip" (mouseenter)="showThrowTooltipFor(position)" (mouseleave)="hideThrowTooltip(position)">
          <button class="throw-btn heart" (click)="throwObjectToPlayer(position, 'heart', $event)" title="Enviar corazón">❤️</button>
          <button class="throw-btn rock" (click)="throwObjectToPlayer(position, 'paper', $event)" title="Lanzar piedra">💣</button>
          <button class="throw-btn star" (click)="throwObjectToPlayer(position, 'star', $event)" title="Enviar estrella">⭐</button>
        </div>
      </div>
    </ng-container>

    <ng-container *ngIf="player?.rol === 'viewer'">
      <section [ngClass]="containerClass || 'circle-container'" [attr.data-player-position]="position">
        <div
          class="circle"
          [ngClass]="{
            'interactive': isAdmin(),
            'cursor-pointer': isAdmin(),
            'hover:bg-gray-200': isAdmin()
          }"
          (mouseenter)="isAdmin() && showAdminTransferTooltip(position); showThrowTooltipFor(position)"
          (mouseleave)="isAdmin() && hideAdminTransferTooltip(position); hideThrowTooltip(position)"
          (click)="isAdmin() && passAdmin(position)"
          (keydown)="$event.preventDefault()"
        >
          <span class="circle-text">
            {{ player?.name?.slice(0, 2) }}
          </span>
          <div *ngIf="adminOptions" 
               class="admin-transfer-tooltip"
               (mouseenter)="showAdminTransferTooltipAgain(position)"
               (mouseleave)="hideAdminTransferTooltip(position)">
            🔑 Pasar permisos de admin
          </div>
          <!-- Tooltip de lanzar objeto para viewers -->
          <div *ngIf="showThrowTooltip[position]" class="throw-tooltip" (mouseenter)="showThrowTooltipFor(position)" (mouseleave)="hideThrowTooltip(position)">
            <button class="throw-btn heart" (click)="throwObjectToPlayer(position, 'heart', $event)" title="Enviar corazón">❤️</button>
            <button class="throw-btn rock" (click)="throwObjectToPlayer(position, 'paper', $event)" title="Lanzar piedra">💣</button>
            <button class="throw-btn star" (click)="throwObjectToPlayer(position, 'star', $event)" title="Enviar estrella">⭐</button>
          </div>
        </div>
        <div class="circle-name">
          <span *ngIf="player?.isAdmin" class="admin-badge">🔑</span>
          {{ player?.name }}
        </div>
      </section>
    </ng-container>
